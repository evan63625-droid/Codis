<!DOCTYPE html>
<html>
<head>
  <title>Radio Live</title>
  <style>
    body { display: flex; font-family: Arial; }
    #chat { width: 40%; border-left: 1px solid #ccc; padding: 10px; }
    #status { color: green; }
  </style>
</head>
<body>

<div>
  <h2>Radio live</h2>
  <p id="status">Appuie sur une touche pour parler</p>
</div>

<div id="chat">
  <h3>Transcription</h3>
  <div id="messages"></div>
</div>

<script>
let recognition;
let speaking = false;

// Speech-to-text
if ('webkitSpeechRecognition' in window) {
  recognition = new webkitSpeechRecognition();
  recognition.lang = "fr-FR";
  recognition.continuous = true;

  recognition.onresult = (event) => {
    let text = event.results[event.results.length - 1][0].transcript;
    let div = document.createElement("div");
    div.textContent = text;
    document.getElementById("messages").appendChild(div);
  };
}

// Appui clavier = parler
document.addEventListener("keydown", () => {
  if (!speaking) {
    speaking = true;
    document.getElementById("status").innerText = "🎙️ Tu parles...";
    recognition.start();
  }
});

document.addEventListener("keyup", () => {
  speaking = false;
  document.getElementById("status").innerText = "Appuie pour parler";
  recognition.stop();
});
</script>

</body>
</html>
